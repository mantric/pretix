<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" width="480" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFE085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9972A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141828;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="480" height="160" rx="16" fill="url(#darkGrad)"/>

  <!-- === LOGOMARK: Stylized 'A' ticket shape === -->
  <!-- Outer hexagon-ticket shape -->
  <polygon points="60,30 100,15 115,30 115,130 100,145 60,145 45,130 45,30" 
           fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.6"/>

  <!-- Inner 'A' chevron mark -->
  <polygon points="80,42 100,118 92,118 80,80 68,118 60,118" 
           fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- Crossbar of A -->
  <rect x="64" y="93" width="32" height="6" rx="1" fill="url(#goldGrad)"/>

  <!-- Ticket perforations left -->
  <circle cx="45" cy="67" r="4" fill="#0A0E1A"/>
  <circle cx="45" cy="93" r="4" fill="#0A0E1A"/>
  <circle cx="45" cy="119" r="4" fill="#0A0E1A"/>
  <!-- Ticket perforations right -->
  <circle cx="115" cy="67" r="4" fill="#0A0E1A"/>
  <circle cx="115" cy="93" r="4" fill="#0A0E1A"/>
  <circle cx="115" cy="119" r="4" fill="#0A0E1A"/>

  <!-- Film strip dots top -->
  <rect x="48" y="18" width="10" height="7" rx="1.5" fill="url(#goldGrad)" opacity="0.5"/>
  <rect x="62" y="18" width="10" height="7" rx="1.5" fill="url(#goldGrad)" opacity="0.5"/>
  <rect x="76" y="18" width="10" height="7" rx="1.5" fill="url(#goldGrad)" opacity="0.5"/>
  <rect x="90" y="18" width="10" height="7" rx="1.5" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- === WORDMARK === -->
  <!-- ADVANTIX in wide-tracked display font via paths approximated with text -->
  <text x="148" y="96" 
        font-family="'Georgia', 'Times New Roman', serif" 
        font-size="52" 
        font-weight="700"
        letter-spacing="6"
        fill="url(#goldGrad)"
        filter="url(#glow)">ADVANTIX</text>

  <!-- Tagline -->
  <text x="150" y="125" 
        font-family="'Georgia', serif" 
        font-size="12.5"
        letter-spacing="5.5"
        fill="#8A95B0"
        font-weight="400">ENTERTAINMENT TICKETING</text>

  <!-- Thin gold rule under wordmark -->
  <line x1="148" y1="107" x2="456" y2="107" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>
</svg>
