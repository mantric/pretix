<svg viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg" width="400" height="80">
  <defs>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="50%" style="stop-color:#FFE085"/>
      <stop offset="100%" style="stop-color:#C9972A"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="80" rx="10" fill="#0A0E1A"/>

  <!-- Compact logomark -->
  <polygon points="30,10 52,4 60,10 60,70 52,76 30,76 22,70 22,10" 
           fill="none" stroke="url(#goldGrad2)" stroke-width="2" opacity="0.55"/>
  <polygon points="41,17 53,63 47,63 41,40 35,63 29,63"
           fill="url(#goldGrad2)" filter="url(#glow2)"/>
  <rect x="32" y="47" width="18" height="4" rx="0.5" fill="url(#goldGrad2)"/>

  <!-- Perforations -->
  <circle cx="22" cy="33" r="3" fill="#0A0E1A"/>
  <circle cx="22" cy="47" r="3" fill="#0A0E1A"/>
  <circle cx="22" cy="61" r="3" fill="#0A0E1A"/>
  <circle cx="60" cy="33" r="3" fill="#0A0E1A"/>
  <circle cx="60" cy="47" r="3" fill="#0A0E1A"/>
  <circle cx="60" cy="61" r="3" fill="#0A0E1A"/>

  <!-- Wordmark compact -->
  <text x="76" y="51"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="36"
        font-weight="700"
        letter-spacing="4"
        fill="url(#goldGrad2)"
        filter="url(#glow2)">ADVANTIX</text>
</svg>
